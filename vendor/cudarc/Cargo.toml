# Atlas-vendored trim: only the `driver` + `nvrtc` backends remain. The
# upstream cublas/cublaslt/cudnn/cufft/cufile/cupti/curand/cusolver/cusolvermg/
# cusparse/cutensor/nccl/nvtx/runtime feature gates (and their modules) were
# removed — Atlas never uses them, and keeping them would re-introduce ~190k
# lines of generated `sys/mod.rs` FFI bindings.
[features]
cuda-11040 = []
cuda-11050 = []
cuda-11060 = []
cuda-11070 = []
cuda-11080 = []
cuda-12000 = []
cuda-12010 = []
cuda-12020 = []
cuda-12030 = []
cuda-12040 = []
cuda-12050 = []
cuda-12060 = []
cuda-12080 = []
cuda-12090 = []
cuda-13000 = []
cuda-13010 = []
cuda-version-from-build-system = []
default = [
    "std",
    "driver",
    "nvrtc",
    "fallback-dynamic-loading",
]
driver = []
dynamic-linking = []
dynamic-loading = []
f16 = ["dep:half"]
f4 = ["dep:float4"]
f8 = ["dep:float8"]
fallback-dynamic-loading = []
fallback-latest = []
no-std = ["no-std-compat/std"]
nvrtc = []
static-linking = []
std = []

[lib]
name = "cudarc"
path = "src/lib.rs"

[dependencies.float4]
version = "0.1.0"
optional = true

[dependencies.float8]
version = "0.7.0"
optional = true

[dependencies.half]
version = "2"
