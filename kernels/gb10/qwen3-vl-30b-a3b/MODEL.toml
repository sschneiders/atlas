[model]
name = "qwen3-vl-30b-a3b"
hf_id = "ig1/Qwen3-VL-30B-A3B-Instruct-NVFP4"
params = "30B"
active_params = "3B"
architecture = "Full Attention + MoE"

layers_total = 48
layers_full_attention = 48
layers_linear_attention = 0

moe_experts = 128
moe_topk = 8
moe_intermediate = 768

hidden_dim = 2048
head_dim = 128
q_heads = 32
kv_heads = 4

vocab_size = 151936
max_position_embeddings = 262144
rope_theta = 5000000
attn_output_gate = false

mtp_layers = 0
vision = true

# Qwen3-VL — vision model, no official thinking mode.
# VL tasks use lower temperature per Qwen3.5 guidance.
# 2026-05-24 empirical band-aid (same lesson as Qwen3.6 sibling).
# temp=0.6 thinking (Qwen GitHub says temp=1.0 risks Chinese-char
# leakage). pres_pen=0.0 + rep_pen=1.1 + dry=0.5 instead of pres=1.5.
[sampling.thinking_text]
temperature = 0.6
top_p = 0.95
top_k = 20
presence_penalty = 0.0
repetition_penalty = 1.1
dry_multiplier = 0.5

[sampling.thinking_coding]
temperature = 0.6
top_p = 0.95
top_k = 20
presence_penalty = 0.0
repetition_penalty = 1.1
dry_multiplier = 0.5

[sampling.non_thinking]
temperature = 0.7
top_p = 0.8
top_k = 20
presence_penalty = 0.0
repetition_penalty = 1.1
dry_multiplier = 0.5

[[model_types]]
model_type = "qwen3_vl_moe"

[kernel]
moe_gate_shmem_bytes = 4096   # hidden_dim(2048) * sizeof(bf16)

[behavior]
# Thinking on by default for all Qwen reasoning-tier models (sweep 2026-05-20).
thinking_default = true
# 2026-05-23 sweep: project-wide default flipped to true.
thinking_in_tools = true
