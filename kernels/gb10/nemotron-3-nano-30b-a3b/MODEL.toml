[model]
name = "nemotron-3-nano-30b-a3b"
hf_id = "nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-NVFP4"
model_type = "nemotron_h"
architecture = "hybrid_mamba2_moe_attention"
parameters = "30B"
active_parameters = "3.5B"

[[model_types]]
model_type = "nemotron_h"

# Nemotron-H uses ChatML format. No official sampling recommendations.
# Conservative defaults to prevent repetition in hybrid SSM architecture.
# 2026-05-24 empirical band-aid. NVIDIA's temp=1.0/top_p=1.0 reasoning
# recipe risked max_tokens wandering on agentic clients (lesson from
# Qwen3.6); reverted to temp=0.6 thinking. rep_pen=1.1 + dry=0.5 for
# loop suppression. Tools at temp=0.6 per NVIDIA agentic recommendation.
[sampling.thinking_text]
temperature = 0.6
top_p = 0.95
top_k = 20
presence_penalty = 0.0
repetition_penalty = 1.1
dry_multiplier = 0.5

[sampling.thinking_coding]
temperature = 0.6
top_p = 0.95
top_k = 20
presence_penalty = 0.0
repetition_penalty = 1.1
dry_multiplier = 0.5

[sampling.non_thinking]
temperature = 0.7
top_p = 0.95
top_k = 20
presence_penalty = 0.0
repetition_penalty = 1.1
dry_multiplier = 0.5

[sampling.tools]
temperature = 0.6
top_p = 0.95
top_k = 20
presence_penalty = 0.0
frequency_penalty = 0.0
repetition_penalty = 1.1
dry_multiplier = 0.5

[behavior]
# 2026-05-23 sweep: false → true. Project-wide default flipped to true
# after F1 reflection-penalty removal eliminated the original Qwen3.6
# <tool_call>-inside-<think> attractor that previously motivated
# disabling. If Nemotron-H Nano's Think-Satisfy reappears in practice,
# re-disable per-model here; see project_qwen36_thinking_fix.md.
thinking_in_tools = true
# Bumped 256 → 1024 in pass-17: fib prompt's reasoning trace needs room to
# complete (before bump, model hit budget mid-step and force-end-thinking
# fired with the model still mid-reasoning, causing prose to spill into the
# post-</think> content slot and break code extraction).
max_thinking_budget = 2048
# Nemotron-H Nano is a thinking-first model: it is trained to produce a
# <think>...</think> reasoning trace before the final answer. Default to
# thinking enabled so the server's reasoning parser (`deepseek_r1` style,
# matching NVIDIA's shipped `nano_v3` parser) strips the block and returns
# clean `content`. A tagless thinking-on output (cut off mid-think) is
# treated as reasoning, never leaked into `content`.
thinking_default = true
