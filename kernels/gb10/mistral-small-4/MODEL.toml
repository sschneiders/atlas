[model]
name = "mistral-small-4"
hf_id = "mistralai/Mistral-Small-4-119B-2603-NVFP4"
model_type = "mistral"
architecture = "mla_moe_attention"
parameters = "119B"
active_parameters = "6.5B"

[[model_types]]
model_type = "mistral"

# Mistral uses [INST] format, not ChatML.
# No official sampling recommendations yet.
# 2026-05-24 empirical band-aid. Mistral docs only call out temp=0.7;
# kept that for thinking/non_thinking, lowered tools to 0.6 (agentic
# coding pattern). Added rep_pen=1.1 + dry=0.5 (Mistral historically
# recommends NO rep penalty but Atlas-team empirical testing on the
# Qwen3.6 sibling shows light penalty + DRY breaks agentic loops
# cleanly without hurting quality).
[sampling.thinking_text]
temperature = 0.6
top_p = 0.95
top_k = 20
presence_penalty = 0.0
repetition_penalty = 1.1
dry_multiplier = 0.5

[sampling.thinking_coding]
temperature = 0.6
top_p = 0.95
top_k = 20
presence_penalty = 0.0
repetition_penalty = 1.1
dry_multiplier = 0.5

[sampling.non_thinking]
temperature = 0.7
top_p = 0.95
top_k = 20
presence_penalty = 0.0
repetition_penalty = 1.1
dry_multiplier = 0.5

[sampling.tools]
temperature = 0.6
top_p = 0.95
top_k = 20
presence_penalty = 0.0
frequency_penalty = 0.0
repetition_penalty = 1.1
dry_multiplier = 0.5

[behavior]
thinking_in_tools = true
# 2026-05-23 sweep: 256 → 2048. Mistral Small 4 is a thinking-first
# model — the old 256 cap was force-injecting </think> well before the
# reasoning chain completed.
max_thinking_budget = 2048
# Mistral Small 4 is a thinking-first model — the HF jinja template sets
# `reasoning_effort: high` by default and the model was trained to reason
# before answering. Honor that intent when the client sends no reasoning
# parameter. Clients can opt out per-request with `reasoning_effort: none`
# (or Anthropic `thinking.type: disabled`, or OpenAI `reasoning.effort: none`).
# The server operator can force off with `--disable-thinking`.
thinking_default = false
# BF16 KV cache default — MLA latent space values exceed FP8 E4M3 range (±448).
default_kv_dtype = "bf16"
fp8_kv_calibration_tokens = 256

[kernel]
moe_gate_shmem_bytes = 8192   # dim(4096) * sizeof(bf16)
