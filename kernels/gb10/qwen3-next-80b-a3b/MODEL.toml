[model]
name = "qwen3-next-80b-a3b"
hf_id = "nvidia/Qwen3-Next-80B-A3B-Instruct-NVFP4"
params = "80B"
active_params = "3B"
layers_attention = 12
layers_ssm = 36
moe_experts = 512
moe_topk = 10
hidden_dim = 2048
head_dim = 256
q_heads = 16
kv_heads = 2

# Qwen3-Next — older architecture, no official thinking mode. Instruct-only model.
# 2026-06-06: aligned rep_pen 1.1->1.0 + dry 0.5->0.0 with the qwen3.6-35b 10/10 campaign
# finding ("temp=0 A/B: 1.1=mangled finish=length; 1.0=clean finish=stop"). Qwen vendor also
# deprecates repetition_penalty>1.0. Keep Qwen instruct top_p=0.8.
[sampling.thinking_text]
temperature = 0.7
top_p = 0.8
top_k = 20
presence_penalty = 0.0
repetition_penalty = 1.0
dry_multiplier = 0.0

[sampling.thinking_coding]
temperature = 0.6
top_p = 0.95
top_k = 20
presence_penalty = 0.0
repetition_penalty = 1.0
dry_multiplier = 0.0

[sampling.non_thinking]
temperature = 0.7
top_p = 0.8
top_k = 20
presence_penalty = 0.0
repetition_penalty = 1.0
dry_multiplier = 0.0

[[model_types]]
model_type = "qwen3_next"

# Model-specific behavior overrides. Without this section the server
# falls back to the hardcoded defaults in atlas-kernels/build.rs
# (max_thinking_budget=256), which is too low for users running
# extended reasoning prompts on Qwen3-Next-80B.
[behavior]
# Qwen3-Next-80B does not have an official thinking-mode template,
# but supports `enable_thinking=true` via the chat-template kwargs.
# When tools are active, leave thinking on — the model uses it
# constructively for multi-step tool reasoning.
thinking_in_tools = true
# 2026-06-06: thinking_default FALSE — Qwen3-Next-80B is the Instruct (non-thinking) variant with
# no official thinking-mode template (see header). Forcing thinking_default=true made the reasoning
# parser mis-capture output as 885-token "reasoning" and never stop. thinking_in_tools stays true.
thinking_default = false
# Benchmarked 2026-04-11: K=2 (1 draft) is the sweet spot for the
# 80B-A3B MoE — verify overhead at K=3 wipes out acceptance gains.
default_num_drafts = 1

[kernel]
moe_gate_shmem_bytes = 4096   # hidden_dim(2048) * sizeof(bf16)
