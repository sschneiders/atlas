[model]
name = "qwen3.5-27b"
hf_id = "Kbenkhaled/Qwen3.5-27B-NVFP4"
params = "27B"
active_params = "27B"
architecture = "Hybrid Attention + SSM (Dense FFN)"

layers_total = 64
layers_full_attention = 16
layers_linear_attention = 48

hidden_dim = 5120
head_dim = 256
q_heads = 24
kv_heads = 4
intermediate_size = 17408

vocab_size = 248320
max_position_embeddings = 262144
rope_theta = 10000000
attn_output_gate = true
partial_rotary_factor = 0.25

mtp_layers = 0

[[model_types]]
model_type = "qwen3_5"

# Kbenkhaled's re-uploaded Qwen3.5-27B-NVFP4 enables MRoPE
# (mrope_interleaved + mrope_section=[11,11,10]) in text_config.
# parse_qwen3_5_config rewrites model_type to "qwen3_6_moe" when MRoPE
# is detected (see atlas-core/src/config.rs:956). hidden_size=5120
# distinguishes this hybrid 27B from the 35B variant (hidden_size=2048).
# These kernels already support the MRoPE-interleaved RoPE path.
[[model_types]]
model_type = "qwen3_6_moe"
hidden_size = 5120

# Qwen3.5 recommended sampling (from model card).
# 2026-05-24 empirical band-aid (matches Qwen3.6-35B-A3B post-revert).
# Reverted from Qwen card's temp=1.0/pres=1.5/2.0 — those caused
# max_tokens-overrun wandering on agentic opencode clients (35B sibling).
[sampling.thinking_text]
temperature = 0.6
top_p = 0.95
top_k = 20
presence_penalty = 0.0
repetition_penalty = 1.1
dry_multiplier = 0.5

[sampling.thinking_coding]
temperature = 0.6
top_p = 0.95
top_k = 20
presence_penalty = 0.0
repetition_penalty = 1.1
dry_multiplier = 0.5

[sampling.non_thinking]
temperature = 0.7
top_p = 0.8
top_k = 20
presence_penalty = 0.0
repetition_penalty = 1.1
dry_multiplier = 0.5

[behavior]
# Thinking on by default for all Qwen reasoning-tier models (sweep 2026-05-20).
thinking_default = true
# 2026-05-23 sweep: project-wide default flipped to true (was unset →
# false via build_parse default).
thinking_in_tools = true
