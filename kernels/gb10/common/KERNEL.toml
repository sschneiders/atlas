# FibQuant tunable rate: the same three `.cu` sources are compiled twice —
# once at k=4 (the existing 8× modules, names UNCHANGED so the FibQuant
# dispatch path stays byte-identical) and once at k=2 (new `_4x` modules for
# FibQuant4x, ~4× compression). `stem` is the `.cu` file stem; `name` is the
# emitted module name. The kernel symbol names are identical across variants
# (only `-D FIB_K` differs), so runtime resolves the same symbol per module.
# A stem listed here MUST NOT also appear in `[modules]` above — the build
# emits only the variants for variant-stems (build.rs: the `stem_variants`
# branch supersedes the single-compile + `[modules]`-override branch).

# paged_decode_attn_fibquant.cu → paged_decode_fibquant (8x) + _4x
[[variants]]
stem = "paged_decode_attn_fibquant"
name = "paged_decode_fibquant"
flags = ["-DFIB_K=4", "-DFIB_N=256"]
[[variants]]
stem = "paged_decode_attn_fibquant"
name = "paged_decode_fibquant_4x"
flags = ["-DFIB_K=2", "-DFIB_N=256"]

# inferspark_prefill_paged_fibquant.cu → prefill_paged_fibquant (8x) + _4x
[[variants]]
stem = "inferspark_prefill_paged_fibquant"
name = "prefill_paged_fibquant"
flags = ["-DFIB_K=4", "-DFIB_N=256"]
[[variants]]
stem = "inferspark_prefill_paged_fibquant"
name = "prefill_paged_fibquant_4x"
flags = ["-DFIB_K=2", "-DFIB_N=256"]

# reshape_and_cache_fibquant.cu → reshape_and_cache_fibquant (8x) + _4x
[[variants]]
stem = "reshape_and_cache_fibquant"
name = "reshape_and_cache_fibquant"
flags = ["-DFIB_K=4", "-DFIB_N=256"]
[[variants]]
stem = "reshape_and_cache_fibquant"
name = "reshape_and_cache_fibquant_4x"
flags = ["-DFIB_K=2", "-DFIB_N=256"]
