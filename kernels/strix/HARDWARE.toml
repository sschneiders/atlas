[hardware]
name = "strix"
vendor = "amd"
# AMD Strix Halo / Ryzen AI Max+ 395 — RDNA 3.5 iGPU (Radeon 8060S).
# Compiled via SCALE (scale-lang.com): the unmodified CUDA .cu sources
# are recompiled for this AMD target. `arch` selects the per-arch SCALE
# toolchain dir (targets/gfx1151/bin/nvcc).
arch = "gfx1151"
compute_capability = "11.5.1"
# LPDDR5X-8000, 256-bit unified bus → ~256 GB/s theoretical (APU,
# bandwidth-limited like GB10 — keep BF16 residual for 2x effective BW).
memory_bandwidth_gbps = 256
memory_type = "LPDDR5X"
# Physical unified RAM on the 64 GB SKU. NOTE: under ROCm-on-WSL the
# GPU-visible pool is the dedicated-VRAM carveout (<<64 GB) — model
# sizing for the WSL bring-up must account for that, not this number.
memory_gb = 64
use_fp32_residual = false
